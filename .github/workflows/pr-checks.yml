name: PR Checks

on:
  pull_request:
  workflow_dispatch:

jobs:
  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Lint (Biome)
        run: npx --yes @biomejs/biome check .

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Tests
        run: npm test

  rust:
    name: Rust
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Build MCP server (required by Tauri build script)
        run: |
          cargo build --release -p maestro-mcp-server
          mkdir -p src-tauri/binaries
          cp target/release/maestro-mcp-server \
            src-tauri/binaries/maestro-mcp-server-x86_64-unknown-linux-gnu

      - name: Tests
        run: cargo test --workspace
